<svg width="640" height="400" viewBox="0 0 640 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="bioTitle bioDesc">
	<title id="bioTitle">Ciencias Biologicas y Ambientales</title>
	<desc id="bioDesc">Helice de ADN, hoja con nervaduras, ola costera y microscopio sobre fondo claro con retícula técnica.</desc>
	<defs>
