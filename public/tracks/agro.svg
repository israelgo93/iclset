<svg width="640" height="400" viewBox="0 0 640 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="agroTitle agroDesc">
	<title id="agroTitle">Agrociencias</title>
	<desc id="agroDesc">Mosaico isometrico de parcelas agricolas con dron, sol calido, perfil de suelo y red de sensores sobre fondo claro.</desc>
	<defs>
