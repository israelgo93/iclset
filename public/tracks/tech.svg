<svg width="640" height="400" viewBox="0 0 640 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="techTitle techDesc">
	<title id="techTitle">Tecnologias de la Informacion</title>
	<desc id="techDesc">Chip AI central conectado a red neuronal, snippet de codigo, flujo de datos y escudo de ciberseguridad sobre fondo claro.</desc>
	<defs>
